name: Compile CV

on:
  push:
    branches:
      - main
    paths:
      - "CV/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.15.0"

      - name: Compile CV to PDF
        run: typst compile --font-path "CV/otfs" --font-path "CV/fonts" CV/CV.typ docs/cv.pdf

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cv.pdf
          git diff --cached --quiet || git commit -m "Auto-compile CV to PDF"
          git push origin HEAD:main
