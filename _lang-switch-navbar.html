<script>
document.addEventListener("DOMContentLoaded", function () {
  var switchDiv = document.querySelector(".lang-switch");
  var tools = document.querySelector(".quarto-navbar-tools");
  if (!switchDiv || !tools) return;

  var dropdown = document.createElement("div");
  dropdown.className = "nav-item dropdown lang-switch-dropdown";

  var toggle = document.createElement("a");
  toggle.href = "";
  toggle.className = "quarto-navigation-tool px-1 dropdown-toggle";
  toggle.setAttribute("role", "button");
  toggle.setAttribute("data-bs-toggle", "dropdown");
  toggle.setAttribute("aria-expanded", "false");
  toggle.title = "Change language";
  toggle.innerHTML = '<i class="bi bi-translate"></i>';
  toggle.addEventListener("click", function (e) {
    e.preventDefault();
  });

  var menu = document.createElement("ul");
  menu.className = "dropdown-menu dropdown-menu-end";

  switchDiv.querySelectorAll("strong, a").forEach(function (el) {
    var li = document.createElement("li");
    if (el.tagName === "A") {
      var a = document.createElement("a");
      a.className = "dropdown-item";
      a.href = el.getAttribute("href");
      a.textContent = el.textContent;
      li.appendChild(a);
    } else {
      var span = document.createElement("span");
      span.className = "dropdown-item disabled active";
      span.textContent = el.textContent;
      li.appendChild(span);
    }
    menu.appendChild(li);
  });

  dropdown.appendChild(toggle);
  dropdown.appendChild(menu);
  tools.insertBefore(dropdown, tools.firstChild);

  switchDiv.style.display = "none";
});

// Home page only: move the CV link to sit just under the fixed profile photo
// instead of at the bottom of the about-card links row.
document.addEventListener("DOMContentLoaded", function () {
  var cvLink = document.querySelector('a.about-link[href="/cv.pdf"]');
  var photo = document.querySelector('img.about-image[src="docs/media/LC.jpeg"]');
  if (!cvLink || !photo) return;

  cvLink.classList.add("cv-link-under-photo");
  photo.insertAdjacentElement("afterend", cvLink);
});
</script>
